<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas de Minas</title>
</head>
<body>

    <header>
        <h1>Receitas de Minas</h1>
    </header>

    <main>
        <section>
            <header>
                <h2>Pão de Queijo</h2>
            </header>
            <img src="img/pao-de-queijo.jpg" alt="Pão de Queijo">
            
            <button popovertarget="segredo">Ver segredo do Chef</button>
            <div id="segredo" popover>
                <p>
                    Jamais coloque os ovos com a massa quente,
                    senão eles cozinham e o pão não cresce.
                </p>
            </div>

        </section>
    </main>
    
</body>
</html>
